name: Release - Java

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (must match gradle.properties, e.g. 2.0.5)"
        required: true
        type: string
      dry-run:
        description: "Build & assemble but do not publish"
        type: boolean
        default: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate version
        run: |
          GRADLE_VERSION=$(grep -E '^version=' gradle.properties | cut -d= -f2)
          if [ "$GRADLE_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::version mismatch: gradle.properties=$GRADLE_VERSION input=${{ inputs.version }}"
            exit 1
          fi
          echo "Version validated: ${{ inputs.version }}"

  build-native:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,     target: aarch64-apple-darwin,      classifier: macos-aarch64 }
          - { os: macos-26-intel,   target: x86_64-apple-darwin,       classifier: macos-x86_64 }
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu,  classifier: linux-x86_64 }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, classifier: linux-aarch64 }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc,    classifier: windows-x86_64 }
          - { os: windows-11-arm,   target: aarch64-pc-windows-msvc,   classifier: windows-aarch64 }
    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.classifier }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-version: "17"

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: System dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libtesseract-dev libleptonica-dev

      - name: System dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install tesseract leptonica

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Force Ninja generator (Windows)
        if: runner.os == 'Windows'
        run: echo "CMAKE_GENERATOR=Ninja" >> $GITHUB_ENV
        shell: bash

      # Conversion tools, so the release gate also verifies image/Office conversion.
      - name: Conversion tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y libreoffice imagemagick
          for p in /etc/ImageMagick-6/policy.xml /etc/ImageMagick-7/policy.xml; do
            if [ -f "$p" ]; then
              sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' "$p" || true
            fi
          done

      - name: Conversion tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install imagemagick
          brew install --cask libreoffice
          echo "/Applications/LibreOffice.app/Contents/MacOS" >> "$GITHUB_PATH"

      - name: Conversion tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install libreoffice-fresh imagemagick -y --no-progress
          "C:\Program Files\LibreOffice\program" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/pdfium-rs
            ~/Library/Caches/pdfium-rs
            ${{ runner.os == 'Windows' && format('{0}\pdfium-rs', env.LOCALAPPDATA) || '' }}
            rust/target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('rust/Cargo.lock') }}

      - name: Build native library (release, with Tesseract)
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage natives (Unix)
        if: runner.os != 'Windows'
        run: bash scripts/stage-natives.sh ${{ matrix.target }} ${{ matrix.classifier }} native-staging/${{ matrix.classifier }}

      - name: Stage natives (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh scripts/stage-natives.ps1 -Target ${{ matrix.target }} -Classifier ${{ matrix.classifier }} -OutDir native-staging/${{ matrix.classifier }}

      # Release gate: the FULL suite (incl. PDF/image+OCR/Office conversion) must
      # pass. If any matrix job fails here, `assemble-publish` (needs: build-native)
      # is skipped, so no tag/Release is created.
      - name: Run tests incl. conversion (release gate)
        shell: bash
        run: ./gradlew :lib:test -PnativeDir="${{ github.workspace }}/native-staging/${{ matrix.classifier }}"

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.classifier }}
          path: native-staging/${{ matrix.classifier }}
          if-no-files-found: error

  assemble-publish:
    needs: build-native
    runs-on: ubuntu-latest
    name: Assemble & publish
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-version: "17"

      - name: Download native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: native-*
          path: artifacts

      - name: Reassemble native-staging
        run: |
          mkdir -p native-staging
          for d in artifacts/native-*; do
            cls="${d#artifacts/native-}"
            mkdir -p "native-staging/$cls"
            cp -r "$d"/. "native-staging/$cls/"
          done
          echo "Staged platforms:"
          find native-staging -maxdepth 1 -mindepth 1 -type d | sort
          find native-staging -type f | sort

      - name: Assemble jars (API + per-platform + all-platforms bundles + sources + javadoc)
        run: ./gradlew :lib:assemble -x test

      - name: List built artifacts
        run: ls -lh lib/build/libs

      - name: Create git tag
        if: ${{ !inputs.dry-run }}
        run: |
          if git ls-remote --tags origin "java-v${{ inputs.version }}" | grep -q .; then
            echo "::error::tag java-v${{ inputs.version }} already exists — bump the version or delete the tag"
            exit 1
          fi
          git tag "java-v${{ inputs.version }}"
          git push origin "java-v${{ inputs.version }}"

      - name: Create GitHub Release
        if: ${{ !inputs.dry-run }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: java-v${{ inputs.version }}
          name: "Java v${{ inputs.version }}"
          generate_release_notes: true
          body: |
            ### Artifacts
            - **`liteparse-java-bundle-${{ inputs.version }}-all-platforms.jar`** — single jar with
              native binaries for **all 6 platforms** (Linux/macOS/Windows × x86_64/arm64). One
              download runs everywhere; the loader selects the right native at runtime.
            - `liteparse-java-bundle-${{ inputs.version }}-<classifier>.jar` — smaller per-platform
              bundles (`linux-x86_64`, `linux-aarch64`, `macos-x86_64`, `macos-aarch64`,
              `windows-x86_64`, `windows-aarch64`).
            - `liteparse-java-${{ inputs.version }}.jar` (plain API), `…-sources.jar`, `…-javadoc.jar`.
          files: lib/build/libs/*.jar

      - name: Dry-run summary
        if: ${{ inputs.dry-run }}
        run: |
          echo "## Dry run — would release java-v${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts:" >> $GITHUB_STEP_SUMMARY
          for f in lib/build/libs/*.jar; do echo "- $(basename "$f") ($(du -h "$f" | cut -f1))" >> $GITHUB_STEP_SUMMARY; done
