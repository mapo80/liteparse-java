name: Win/ARM64 conversion

# Dedicated pipeline for the one platform where end-to-end conversion was not
# fully exercised: Windows on ARM64. The image -> PDF path used to be skipped
# (see ConversionTest#convertsImageAndRunsOcr) because Chocolatey only ships an
# x64 ImageMagick (emulated) and pulling Ghostscript in alongside it hangs the
# installer under emulation. ImageMagick writes a raster -> PDF natively (no
# Ghostscript needed), so the fix is simply to use a NATIVE ARM64 ImageMagick
# build (./.github/actions/imagemagick-arm64).
#
#   1. `probe` — fast, build-free diagnostic: install native ARM64 ImageMagick
#      and confirm, at the shell level, that it turns the test PNG into a PDF.
#   2. `conversion-test` — the real gate: build the native lib and run the full
#      ConversionTest with `-PforceImageConversion=true`, so the image case is
#      exercised instead of skipped.
#
# Once green, the native-ARM64 ImageMagick install folds into conversion-tests.yml
# and the Win/ARM64 skip is removed.

on:
  workflow_dispatch:
  push:
    branches:
      - "ci/win-arm64**"

env:
  CARGO_TERM_COLOR: always

jobs:
  # --------------------------------------------------------------------------
  # Fast, build-free diagnostic: can native ARM64 ImageMagick do PNG -> PDF here?
  # --------------------------------------------------------------------------
  probe:
    name: ImageMagick probe (windows-aarch64)
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Runner architecture
        shell: pwsh
        run: |
          Write-Host "PROCESSOR_ARCHITECTURE = $env:PROCESSOR_ARCHITECTURE"
          Write-Host "PROCESSOR_ARCHITEW6432 = $env:PROCESSOR_ARCHITEW6432"

      - name: Install ImageMagick (native ARM64)
        uses: ./.github/actions/imagemagick-arm64

      - name: Tool discovery
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          Write-Host "== Get-Command magick =="
          Get-Command magick -ErrorAction SilentlyContinue | Select-Object Name, Source | Format-Table -AutoSize
          Write-Host "`n== magick -list configure (DELEGATES / FEATURES) =="
          & magick -list configure 2>&1 | Select-String -Pattern 'DELEGATES|FEATURES'

      - name: Probe PNG -> PDF (magick)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $img = "lib/src/test/resources/receipt.png"
          Write-Host "Converting $img -> probe-magick.pdf ..."
          & magick "$img" -density 150 -units PixelsPerInch probe-magick.pdf 2>&1
          Write-Host "magick exit code: $LASTEXITCODE"
          if (-not (Test-Path probe-magick.pdf)) { Write-Error "magick produced no PDF"; exit 1 }
          $bytes = [System.IO.File]::ReadAllBytes('probe-magick.pdf')
          $head = -join ($bytes[0..4] | ForEach-Object { [char]$_ })
          Write-Host "probe-magick.pdf size=$($bytes.Length) header=[$head]"
          if ($head -ne '%PDF-') { Write-Error "probe-magick.pdf is not a valid PDF"; exit 1 }

      - name: Upload probe PDF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: win-arm64-probe-pdf
          path: probe-magick.pdf
          if-no-files-found: ignore

  # --------------------------------------------------------------------------
  # The real gate: build the native lib and run ConversionTest with the image
  # case forced on. Mirrors conversion-tests.yml's windows-arm leg, but with a
  # native ARM64 ImageMagick (no Ghostscript) plus a warm-up guard.
  # --------------------------------------------------------------------------
  conversion-test:
    name: Forced conversion test (windows-aarch64)
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: "17"

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: aarch64-pc-windows-msvc

      - name: Force Ninja generator
        shell: bash
        run: echo "CMAKE_GENERATOR=Ninja" >> $GITHUB_ENV

      - name: Install Ninja
        run: choco install ninja -y

      - name: Install LibreOffice
        shell: pwsh
        run: |
          choco install libreoffice-fresh -y --no-progress
          "C:\Program Files\LibreOffice\program" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install ImageMagick (native ARM64)
        uses: ./.github/actions/imagemagick-arm64

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/pdfium-rs
            ~/Library/Caches/pdfium-rs
            ${{ format('{0}\pdfium-rs', env.LOCALAPPDATA) }}
            rust/target
          key: Windows-aarch64-pc-windows-msvc-${{ hashFiles('rust/Cargo.lock') }}

      - name: Build native library (release, with Tesseract)
        working-directory: rust
        run: cargo build --release --target aarch64-pc-windows-msvc

      - name: Stage natives
        shell: pwsh
        run: pwsh scripts/stage-natives.ps1 -Target aarch64-pc-windows-msvc -Classifier windows-aarch64 -OutDir native-staging/windows-aarch64

      - name: Warm up ImageMagick
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          1..2 | ForEach-Object { & magick -version > $null 2>&1; Start-Sleep -Milliseconds 500 }
          Write-Host "ImageMagick warmed up"

      - name: Tool presence on PATH
        shell: bash
        run: |
          echo "On PATH:"
          command -v soffice libreoffice magick convert 2>/dev/null || true

      - name: Run conversion tests (image case forced on)
        shell: bash
        run: ./gradlew :lib:test --tests 'io.liteparse.ConversionTest' -PforceImageConversion=true -PnativeDir="${{ github.workspace }}/native-staging/windows-aarch64"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: win-arm64-conversion-report
          path: lib/build/reports/tests/test
          if-no-files-found: ignore
