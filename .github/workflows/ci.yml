name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-lint:
    name: Rust lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y libtesseract-dev libleptonica-dev
      - name: rustfmt
        working-directory: rust
        run: cargo fmt --all --check
      - name: clippy
        working-directory: rust
        run: cargo clippy --all-targets -- -D warnings

  build-test:
    name: ${{ matrix.classifier }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,     target: aarch64-apple-darwin,      classifier: macos-aarch64 }
          - { os: macos-26-intel,   target: x86_64-apple-darwin,       classifier: macos-x86_64 }
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu,  classifier: linux-x86_64 }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, classifier: linux-aarch64 }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc,    classifier: windows-x86_64 }
          - { os: windows-11-arm,   target: aarch64-pc-windows-msvc,   classifier: windows-aarch64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          # Liberica provides JDK 17 for all six platforms, including Windows/ARM64
          # (Temurin has no Windows/ARM64 JDK 17 build).
          distribution: liberica
          java-version: "17"

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: System dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libtesseract-dev libleptonica-dev

      - name: System dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install tesseract leptonica

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Force Ninja generator (Windows)
        if: runner.os == 'Windows'
        run: echo "CMAKE_GENERATOR=Ninja" >> $GITHUB_ENV
        shell: bash

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/pdfium-rs
            ~/Library/Caches/pdfium-rs
            ${{ runner.os == 'Windows' && format('{0}\pdfium-rs', env.LOCALAPPDATA) || '' }}
            rust/target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('rust/Cargo.lock') }}

      - name: Build native library (release, with Tesseract)
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage natives (Unix)
        if: runner.os != 'Windows'
        run: bash scripts/stage-natives.sh ${{ matrix.target }} ${{ matrix.classifier }} native-staging/${{ matrix.classifier }}

      - name: Stage natives (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh scripts/stage-natives.ps1 -Target ${{ matrix.target }} -Classifier ${{ matrix.classifier }} -OutDir native-staging/${{ matrix.classifier }}

      - name: Test (JUnit) + build self-contained bundle jar
        shell: bash
        run: ./gradlew :lib:test :lib:bundleJar-${{ matrix.classifier }} -PexcludeTags=conversion -PnativeDir="${{ github.workspace }}/native-staging/${{ matrix.classifier }}"
